name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: next-headless-cms-fe

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant_id: [vukans-bike, resort-example]
    # next lint loads next.config.ts, which requires TENANT_ID at config-eval time.
    env:
      TENANT_ID: ${{ matrix.tenant_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: next-headless-cms-fe/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: next-headless-cms-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (${{ matrix.tenant_id }})
        run: pnpm exec next lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: next-headless-cms-fe/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: next-headless-cms-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

  build-tenants:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    strategy:
      fail-fast: false
      matrix:
        tenant_script: [build:bike, build:resort]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: next-headless-cms-fe/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: next-headless-cms-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tenant
        run: pnpm ${{ matrix.tenant_script }}
