name: Deploy Bike

on:
  workflow_dispatch:

concurrency:
  group: deploy-bike-production
  cancel-in-progress: true

defaults:
  run:
    working-directory: next-headless-cms-fe

jobs:
  deploy-bike:
    runs-on: ubuntu-latest
    env:
      TENANT_ID: vukans-bike
      NODE_ENV: production
      VERCEL_ORG_ID: ${{ secrets.BIKE_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.BIKE_VERCEL_PROJECT_ID }}
      STRAPI_URL: ${{ secrets.BIKE_STRAPI_URL }}
      STRAPI_API_TOKEN: ${{ secrets.BIKE_STRAPI_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: next-headless-cms-fe/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: next-headless-cms-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build bike tenant
        run: pnpm build:bike

      - name: Verify tenant isolation
        run: TENANT_ID=vukans-bike pnpm verify:build

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.BIKE_VERCEL_TOKEN }}

      - name: Build Vercel prebuilt output
        env:
          NEXT_USE_VERCEL_DIST: "1"
        run: pnpm dlx vercel build --prod --token=${{ secrets.BIKE_VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        run: pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.BIKE_VERCEL_TOKEN }}
